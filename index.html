<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Almoxarifado - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Centraliza e aplica cores personalizadas */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a2b6b; /* Fundo azul */
            color: #002d62; /* Texto principal */
        }
        .form-signin {
            max-width: 330px;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Sombra */
            background-color: #f8f9fa; /* Cinza */
        }
        
        /* Botão Azul */
        .btn-senai {
            background-color: #1a2b6b; 
            border-color: #1a2b6b;
            color: white;
            font-weight: bold;
        }
        .btn-senai:hover {
            background-color: #111D4A; 
            border-color: #111D4A;
            color: white;
        }

        /* Ícone */
        .icon-senai {
            color: #ff3b30;
        }
        
        /* Borda */
        .form-control:focus {
            border-color: #111D4A;
            box-shadow: 0 0 0 0.25rem rgba(0, 45, 98, 0.25);
        }
    </style>
</head>
<body>

    <main class="form-signin w-100 m-auto text-center">
        <form>
            <i class="bi bi-box-seam icon-senai" style="font-size: 3.5rem;"></i>
            <h1 class="h3 mb-3 fw-bold">Almoxarifado SENAI</h1>

            <div class="form-floating mb-2">
                <input type="email" class="form-control" id="floatingInput" placeholder="nome@exemplo.com">
                <label for="floatingInput">E-mail</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Senha">
                <label for="floatingPassword">Senha</label>
            </div>

            <div class="checkbox mb-3 text-start">
                <label>
                    <input type="checkbox" value="remember-me"> Lembrar de mim</label>
            </div>
            
            <a href="painel.html" class="btn btn-senai w-100 py-2">Entrar</a>
            
            <p class="mt-5 mb-3 text-body-secondary">&copy; 2026</p>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
