<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Almoxarifado SENAI - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        /* Barra lateral com a cor do SENAI */
        .sidebar-senai {
            background-color: #1a2b6b;
            min-height: 100vh;
        }

        /* Links da lateral ficarem brancos e com efeito ao passar o mouse */
        .sidebar-senai .nav-link {
            color: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .sidebar-senai .nav-link:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .sidebar-senai .nav-link.active {
            color: #ffffff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-2 col-sm-3 col-xl-2 sidebar-senai p-0">
                <nav class="navbar border-bottom border-white border-opacity-25 mb-3" data-bs-theme="dark">
                    <div class="container-fluid">
                        <a class="navbar-brand d-flex align-items-center" href="painel.html">
                            <i class="bi bi-house-door fs-4"></i>
                            <span class="d-none d-sm-inline ms-2">Menu Principal</span>
                        </a>
                    </div>
                </nav>

                <nav class="nav flex-column px-2">
                   <a class="nav-link active" href="painel.html">
                    <i class="bi bi-speedometer2"></i> <span class="d-none d-sm-inline ms-2">Início</span>
                   </a>
                   <a class="nav-link" href="#">
                    <i class="bi bi-plus-circle"></i> <span class="d-none d-sm-inline ms-2">Adicionar</span>
                   </a>
                   <a class="nav-link" href="#">
                    <i class="bi bi-box-seam"></i> <span class="d-none d-sm-inline ms-2">Estoque</span>
                   </a>
                   <a class="nav-link" href="#">
                    <i class="bi bi-arrow-left-right"></i> <span class="d-none d-sm-inline ms-2">Requisitar</span>
                   </a>
                </nav>
            </div>

            <div class="col-10 col-sm-9 col-xl-10 p-0 m-0 bg-light">
                <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
                    <div class="container-fluid">
                        <span class="navbar-text fw-bold text-dark d-none d-md-block">Bem-vindo ao Almoxarifado SENAI</span>
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link text-danger fw-bold" href="index.html">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sair</a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <div class="px-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Painel</h1>
                    </div>
                    
                    <div class="container-fluid">
                        <i class="bi bi-info-circle me-2"></i>Tabelas de materiais.</div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
